spring.application.name=secure-payment-gateway-api
server.port=8080

# ---------------------------------------------------------------------------
# ML Engine — URL externalisée en variable d'environnement (J9)
# Valeur par défaut : localhost pour le développement local.
# En Docker : ML_ENGINE_URL=http://fraud-ml:8000
# ---------------------------------------------------------------------------
ml.engine.url=${ML_ENGINE_URL:http://localhost:8000}

# ---------------------------------------------------------------------------
# Base de données PostgreSQL — connexion externalisée en variables d'env
# En local : valeurs par défaut (fraud_db / postgres / postgres)
# En Docker : DB_HOST=postgres-db, DB_NAME, DB_USER, DB_PASSWORD injectés
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:fraud_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update

# ---------------------------------------------------------------------------
# Actuator — exposition du seul endpoint /actuator/health
# show-details=when-authorized : les détails ne sont visibles qu'aux admins
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# ---------------------------------------------------------------------------
# Jackson — désactivation du mode strict sur les champs inconnus.
# Note : write-dates-as-timestamps retiré (n'existe plus dans Jackson 3.x).
# Le format ISO-8601 est garanti via @JsonFormat sur les entités.
# ---------------------------------------------------------------------------
spring.jackson.deserialization.fail-on-unknown-properties=false
