services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres-db:
    image: postgres:15
    container_name: fraud-postgres
    environment:
      POSTGRES_DB: fraud_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fraud_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ML Engine Python/FastAPI ─────────────────────────────────────────────────
  fraud-ml-engine:
    build:
      context: ../fraud-detection-ml-engine
    container_name: fraud-ml-engine
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Gateway Java/Spring Boot ─────────────────────────────────────────────────
  payment-gateway:
    build:
      context: .
    container_name: payment-gateway
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres-db
      DB_NAME: fraud_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      ML_ENGINE_URL: http://fraud-ml-engine:8000
    depends_on:
      postgres-db:
        condition: service_healthy
      fraud-ml-engine:
        condition: service_healthy

volumes:
  postgres_data:
